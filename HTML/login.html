<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login | GrahanIA</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css" />
</head>
<body class="login-body">
  <div class="page-bg"></div>
  <main class="login-page">
    <a href="index.html" class="back-home"><span>←</span> Voltar para Home</a>
    <section class="login-center">
      <div class="login-brand-icon"><svg viewBox="0 0 24 24"><path d="M12 2.4c.3 0 .5.2.6.5l.9 3.1c.1.3.3.5.6.6l3.1.9c.3.1.5.3.5.6s-.2.5-.5.6l-3.1.9c-.3.1-.5.3-.6.6l-.9 3.1c-.1.3-.3.5-.6.5s-.5-.2-.6-.5l-.9-3.1c-.1-.3-.3-.5-.6-.6l-3.1-.9c-.3-.1-.5-.3-.5-.6s.2-.5.5-.6l3.1-.9c.3-.1.5-.3.6-.6l.9-3.1c.1-.3.3-.5.6-.5Z"/></svg></div>
      <h1>Bem-vindo ao GrahanIA</h1>
      <p class="login-subtitle">A inteligência que faltava no seu patrimônio.</p>
      <div class="login-card">
        <div class="login-tabs">
          <a class="tab-btn active" href="login.html">Entrar</a>
          <a class="tab-btn" href="register.html">Criar Conta</a>
        </div>
        <button class="google-btn" type="button">Continuar com Google</button>
        <div class="divider"><span>OU USE E-MAIL</span></div>
        <form class="login-form">
          <label>E-mail</label>
          <div class="input-wrap no-icon"><input type="email" placeholder="seu@email.com" /></div>
          <label>Senha</label>
          <div class="input-wrap no-icon"><input type="password" placeholder="••••••••" /></div>
          <a href="dashboard.html" class="login-submit light">Acessar Dashboard</a>
        </form>
      </div>
    </section>
    <div class="login-badge">PROTEGIDO POR CRIPTOGRAFIA MILITAR GRAHANIA · 2024</div>
  </main>
</body>
</html>
